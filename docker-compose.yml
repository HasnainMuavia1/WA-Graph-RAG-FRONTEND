services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uchenab-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://host.docker.internal:8058
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
