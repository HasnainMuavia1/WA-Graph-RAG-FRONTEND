<!doctype html>
<html lang="en" data-theme="light" data-palette="default">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/white_logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uchenab</title>
    <script>
      (function () {
        var stored = localStorage.getItem('uchenab-theme');
        var palette = localStorage.getItem('uchenab-palette') || 'default';
        var dark =
          stored === 'dark' ||
          (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-palette', palette);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
