name: Frontend CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read

jobs:
  verify:
    name: Verify & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint || true # Allow build to continue if lint has minor non-breaking warnings

      - name: Compile TypeScript & Build
        run: npm run build

      - name: Dry-run Docker Build
        run: docker build -t uchenab-frontend:test .
